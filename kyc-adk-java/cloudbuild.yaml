# Cloud Build configuration for KYC Multi-Agent System
# This file is used by Google Cloud Build for CI/CD

steps:
  # Step 1: Run tests
  - name: 'maven:3.9-eclipse-temurin-17'
    entrypoint: 'mvn'
    args: ['test', '-B']
    id: 'run-tests'

  # Step 2: Build the application
  - name: 'maven:3.9-eclipse-temurin-17'
    entrypoint: 'mvn'
    args: ['package', '-DskipTests', '-B']
    id: 'build-app'
    waitFor: ['run-tests']

  # Step 3: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/kyc-multiagent-system:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/kyc-multiagent-system:latest'
      - '.'
    id: 'build-docker'
    waitFor: ['build-app']

  # Step 4: Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/kyc-multiagent-system:$COMMIT_SHA'
    id: 'push-sha'
    waitFor: ['build-docker']

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/kyc-multiagent-system:latest'
    id: 'push-latest'
    waitFor: ['build-docker']

  # Step 5: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'kyc-multiagent-system'
      - '--image=gcr.io/$PROJECT_ID/kyc-multiagent-system:$COMMIT_SHA'
      - '--platform=managed'
      - '--region=${_REGION}'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--timeout=300'
      - '--concurrency=100'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID'
      - '--set-env-vars=GOOGLE_CLOUD_LOCATION=${_REGION}'
      - '--set-env-vars=GOOGLE_GENAI_USE_VERTEXAI=true'
      - '--allow-unauthenticated'
    id: 'deploy'
    waitFor: ['push-sha']

# Substitution variables
substitutions:
  _REGION: 'us-central1'

# Build options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

# Images to be pushed
images:
  - 'gcr.io/$PROJECT_ID/kyc-multiagent-system:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/kyc-multiagent-system:latest'

# Build timeout
timeout: '1800s'

# Tags for filtering builds
tags:
  - 'kyc-multiagent-system'
  - 'adk-java'
  - 'cloud-run'
