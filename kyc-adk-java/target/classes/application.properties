# KYC Multi-Agent System Configuration
# Google ADK Java + Spring Boot

# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/

# Spring Boot Actuator (Health checks for Cloud Run)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.health.defaults.enabled=true

# Google Cloud / ADK Configuration
google.cloud.project=${GOOGLE_CLOUD_PROJECT:}
google.cloud.location=${GOOGLE_CLOUD_LOCATION:us-central1}
google.genai.use-vertexai=${GOOGLE_GENAI_USE_VERTEXAI:true}

# Gemini Model Configuration
adk.model.default=gemini-2.0-flash
adk.model.temperature=0.3
adk.model.max-tokens=4096

# Logging Configuration
logging.level.root=INFO
logging.level.com.dnb.kyc=DEBUG
logging.level.com.google.adk=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# CORS Configuration (for frontend)
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# JSON Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true

# Cloud Run Specific
spring.main.lazy-initialization=false
